name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -e "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ${{ secrets.FTP_HOST }};
            cd ../public_html;
            mirror -R --verbose \
              --exclude .git \
              --exclude .github \
              --exclude CNAME \
              ./ ./;
            bye
          "